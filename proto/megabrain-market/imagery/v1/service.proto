syntax = "proto3";

package megabrain-market.imagery.v1;

import "sebuf/http/annotations.proto";
import "megabrain-market/imagery/v1/search_imagery.proto";

service ImageryService {
  option (sebuf.http.service_config) = {base_path: "/api/imagery/v1"};

  // SearchImagery searches satellite imagery scenes by bounding box, datetime range, and source, returning matching scenes and a total-results count.
  rpc SearchImagery(SearchImageryRequest) returns (SearchImageryResponse) {
    option (sebuf.http.config) = {path: "/search-imagery", method: HTTP_METHOD_GET};
  }
}
