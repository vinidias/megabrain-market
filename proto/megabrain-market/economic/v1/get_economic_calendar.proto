syntax = "proto3";

package megabrain-market.economic.v1;

import "sebuf/http/annotations.proto";

message GetEconomicCalendarRequest {
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  string from_date = 1 [(sebuf.http.query) = {name: "fromDate"}, (sebuf.http.unimplemented) = true];
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  string to_date = 2 [(sebuf.http.query) = {name: "toDate"}, (sebuf.http.unimplemented) = true];
}

message EconomicEvent {
  string event = 1;
  string country = 2;
  string date = 3;
  string impact = 4;
  string actual = 5;
  string estimate = 6;
  string previous = 7;
  string unit = 8;
}

message GetEconomicCalendarResponse {
  repeated EconomicEvent events = 1;
  string from_date = 2;
  string to_date = 3;
  int32 total = 4;
  // True when the upstream or seed-backed variant is unavailable; empty payload fields
  // are graceful degradation, not confirmed zero data.
  bool unavailable = 5;
}
