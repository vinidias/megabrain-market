syntax = "proto3";

package megabrain-market.climate.v1;

import "sebuf/http/annotations.proto";
import "megabrain-market/core/v1/pagination.proto";
import "megabrain-market/climate/v1/climate_disaster.proto";

// ListClimateDisastersRequest specifies filters for retrieving climate disasters.
message ListClimateDisastersRequest {
  // Maximum items per page (1-100).
  int32 page_size = 1 [(sebuf.http.query) = { name: "page_size" }];
  // Cursor for next page.
  string cursor = 2 [(sebuf.http.query) = { name: "cursor" }];
}

// ListClimateDisastersResponse contains climate disaster events.
message ListClimateDisastersResponse {
  // The list of disasters.
  repeated ClimateDisaster disasters = 1;
  // Pagination metadata.
  megabrain-market.core.v1.PaginationResponse pagination = 2;
}
