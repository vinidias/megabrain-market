syntax = "proto3";

package megabrain-market.conflict.v1;

import "sebuf/http/annotations.proto";
import "megabrain-market/core/v1/pagination.proto";
import "megabrain-market/conflict/v1/ucdp_event.proto";

// ListUcdpEventsRequest specifies filters for retrieving UCDP violence events.
message ListUcdpEventsRequest {
  // Start of time range (inclusive), Unix epoch milliseconds.
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  int64 start = 1 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER, (sebuf.http.query) = { name: "start" }, (sebuf.http.unimplemented) = true];
  // End of time range (inclusive), Unix epoch milliseconds.
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  int64 end = 2 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER, (sebuf.http.query) = { name: "end" }, (sebuf.http.unimplemented) = true];
  // Maximum items per page (1-100).
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  int32 page_size = 3 [(sebuf.http.query) = { name: "page_size" }, (sebuf.http.unimplemented) = true];
  // Cursor for next page.
  // Accepted but currently ignored; no-op until this handler supports the parameter.
  string cursor = 4 [(sebuf.http.query) = { name: "cursor" }, (sebuf.http.unimplemented) = true];
  // Optional country filter (ISO 3166-1 alpha-2).
  string country = 5 [(sebuf.http.query) = { name: "country" }];
}

// ListUcdpEventsResponse contains UCDP violence events matching the request.
message ListUcdpEventsResponse {
  // The list of UCDP violence events.
  repeated UcdpViolenceEvent events = 1;
  // Pagination metadata.
  megabrain-market.core.v1.PaginationResponse pagination = 2;
}
