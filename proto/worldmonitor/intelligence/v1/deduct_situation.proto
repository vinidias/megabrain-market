syntax = "proto3";

package megabrain-market.intelligence.v1;

message DeductSituationRequest {
  string query = 1;
  string geo_context = 2;
  // Optional analytical framework instructions.
  string framework = 3;
}

message DeductSituationResponse {
  string analysis = 1;
  string model = 2;
  string provider = 3;
}
