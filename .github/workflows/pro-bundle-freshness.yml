name: Pro bundle freshness

# Rebuilds pro-test on any PR that touches pro-test/**, public/pro/**, or
# the catalog/generator that feed pro-test's generated pricing model, and
# fails if generated config, locale placeholders, or committed public/pro/
# do not match the regenerated and rebuilt output.
#
# Why: public/pro/ is committed to the repo and served verbatim by Vercel.
# The root build script does NOT run pro-test's vite build, so if a PR
# changes pro-test/src/** or catalog-fed pricing copy but forgets to commit
# the regenerated bundle, the deploy silently ships stale JS. Happened with
# PR #3227 -> #3228 and catalog copy drift in #4563 -> #4574.

on:
  pull_request:
    paths:
      - 'convex/config/productCatalog.ts'
      - 'scripts/generate-product-config.mjs'
      - 'pro-test/**'
      - 'public/pro/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            pro-test/package-lock.json

      - name: Install root deps
        run: npm ci --ignore-scripts

      - name: Regenerate product config
        run: npx tsx scripts/generate-product-config.mjs

      - name: Install pro-test deps
        run: cd pro-test && npm ci

      - name: Build pro-test
        run: cd pro-test && npm run build

      - name: Verify generated product config, pro locales, and public/pro/ match build output
        run: |
          if ! git diff --exit-code src/config/products.generated.ts api/_product-fallback-prices.js pro-test/src/generated/tiers.json pro-test/src/locales/ public/pro/; then
            echo "::error::Product catalog, generated config, pro locales, or public/pro/ is stale."
            echo "Vercel ships whatever is committed under public/pro/ — it does NOT rebuild pro-test on deploy."
            echo "Run 'npx tsx scripts/generate-product-config.mjs', then 'cd pro-test && npm run build', and commit generated config, pro locales, plus public/pro/."
            exit 1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard public/pro/)
          if [ -n "$UNTRACKED" ]; then
            echo "::error::Untracked files in public/pro/ after rebuild:"
            echo "$UNTRACKED"
            echo "Run 'git add public/pro/' and commit the regenerated bundle."
            exit 1
          fi
